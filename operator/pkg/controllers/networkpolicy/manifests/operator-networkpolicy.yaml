apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: multicluster-global-hub-operator
  namespace: {{.Namespace}}
  labels:
    global-hub.open-cluster-management.io/managed-by: global-hub-operator
spec:
  podSelector:
    matchLabels:
      name: multicluster-global-hub-operator
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Allow health check probes from kubelet (runs on node, not in a pod)
  - ports:
    - protocol: TCP
      port: 8081
  # Allow webhook traffic from API server
  - ports:
    - protocol: TCP
      port: 9443
  egress:
  # Allow DNS resolution
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: openshift-dns
    ports:
    - protocol: UDP
      port: 5353
    - protocol: TCP
      port: 5353
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
  # Allow connections to PostgreSQL in the hub namespace
  - to:
    - podSelector:
        matchLabels:
          name: {{.PostgresName}}
    ports:
    - protocol: TCP
      port: 5432
  {{- if .BYOPostgres }}
  # Allow connections to PostgreSQL in external namespaces (BYO)
  {{- if .ExternalPostgresCIDRs }}
  - to:
    {{- range .ExternalPostgresCIDRs }}
    - ipBlock:
        cidr: {{ . }}
    {{- end }}
    ports:
    - protocol: TCP
      port: 5432
  {{- else }}
  - to:
    - namespaceSelector: {}
      podSelector:
        matchExpressions:
        - key: cnpg.io/cluster
          operator: Exists
    ports:
    - protocol: TCP
      port: 5432
  - to:
    - namespaceSelector: {}
      podSelector:
        matchExpressions:
        - key: postgres-operator.crunchydata.com/cluster
          operator: Exists
    ports:
    - protocol: TCP
      port: 5432
  {{- end }}
  {{- end }}
  {{- if .BYOKafka }}
  # Allow connections to Kafka in external namespaces (BYO Strimzi)
  {{- if .ExternalKafkaCIDRs }}
  - to:
    {{- range .ExternalKafkaCIDRs }}
    - ipBlock:
        cidr: {{ . }}
    {{- end }}
    ports:
    - protocol: TCP
      port: 9093
    - protocol: TCP
      port: 9091
  {{- else }}
  - to:
    - namespaceSelector: {}
      podSelector:
        matchLabels:
          strimzi.io/cluster: kafka
    ports:
    - protocol: TCP
      port: 9093
    - protocol: TCP
      port: 9091
  {{- end }}
  {{- else }}
  # Allow connections to Kafka in the hub namespace
  - to:
    - podSelector:
        matchLabels:
          strimzi.io/cluster: kafka
    ports:
    - protocol: TCP
      port: 9093
    - protocol: TCP
      port: 9091
  {{- end }}
  # Allow connections to SpiceDB
  - to:
    - podSelector:
        matchLabels:
          authzed.com/cluster: spicedb
    ports:
    - protocol: TCP
      port: 50051
  # Allow connections to relations-api
  - to:
    - podSelector:
        matchLabels:
          app: relations-api
    ports:
    - protocol: TCP
      port: 8000
