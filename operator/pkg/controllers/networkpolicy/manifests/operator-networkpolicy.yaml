apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: multicluster-global-hub-operator
  namespace: {{.Namespace}}
  labels:
    global-hub.open-cluster-management.io/managed-by: global-hub-operator
spec:
  podSelector:
    matchLabels:
      name: multicluster-global-hub-operator
  policyTypes:
  - Egress
  egress:
  # Allow DNS resolution
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: openshift-dns
    ports:
    - protocol: UDP
      port: 5353
    - protocol: TCP
      port: 5353
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
  # Allow access to Kubernetes API
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: default
    ports:
    - protocol: TCP
      port: 443
  # Allow connections to PostgreSQL
  - to:
    - podSelector:
        matchLabels:
          name: {{.PostgresName}}
    ports:
    - protocol: TCP
      port: 5432
  # Allow connections to Kafka
  - to:
    - podSelector:
        matchLabels:
          strimzi.io/cluster: kafka
    ports:
    - protocol: TCP
      port: 9093
    - protocol: TCP
      port: 9091
  # Allow connections to SpiceDB
  - to:
    - podSelector:
        matchLabels:
          authzed.com/cluster: spicedb
    ports:
    - protocol: TCP
      port: 50051
  # Allow connections to relations-api
  - to:
    - podSelector:
        matchLabels:
          app: relations-api
    ports:
    - protocol: TCP
      port: 8000
