apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns
  namespace: {{.Namespace}}
  labels:
    global-hub.open-cluster-management.io/managed-by: global-hub-operator
spec:
  podSelector: {}
  policyTypes:
  - Egress
  egress:
  # Allow DNS resolution to OpenShift DNS
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: openshift-dns
    ports:
    - protocol: UDP
      port: 5353
    - protocol: TCP
      port: 5353
  # Also allow kube-dns for non-OpenShift clusters
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
    podSelector:
      matchLabels:
        k8s-app: kube-dns
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
