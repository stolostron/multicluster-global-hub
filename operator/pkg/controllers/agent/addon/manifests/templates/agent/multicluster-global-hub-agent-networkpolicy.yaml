apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: multicluster-global-hub-agent
  namespace: {{ .AddonInstallNamespace }}
  labels:
    addon.open-cluster-management.io/hosted-manifest-location: none
    global-hub.open-cluster-management.io/managed-by: global-hub-agent
spec:
  podSelector:
    matchLabels:
      name: multicluster-global-hub-agent
  policyTypes:
  - Egress
  egress:
  # Allow DNS resolution (OpenShift)
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: openshift-dns
    ports:
    - protocol: UDP
      port: 5353
    - protocol: TCP
      port: 5353
  # Allow DNS resolution (Kubernetes)
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
  # Allow access to Kubernetes API server (managed hub cluster; ipBlock when resolved on hub)
  {{- if .APIServerCIDRs }}
  - to:
    {{- range .APIServerCIDRs }}
    - ipBlock:
        cidr: {{ . }}
    {{- end }}
    ports:
    - protocol: TCP
      port: 443
    - protocol: TCP
      port: 6443
  {{- else }}
  - ports:
    - protocol: TCP
      port: 443
    - protocol: TCP
      port: 6443
  {{- end }}
  # Allow connections to Kafka (Strimzi)
  - to:
    - namespaceSelector: {}
      podSelector:
        matchLabels:
          strimzi.io/cluster: kafka
    ports:
    - protocol: TCP
      port: 9093
    - protocol: TCP
      port: 9094
    - protocol: TCP
      port: 9095
  # Allow connections to external Global Hub Kafka bootstrap brokers
  {{- if .ExternalKafkaCIDRs }}
  - to:
    {{- range .ExternalKafkaCIDRs }}
    - ipBlock:
        cidr: {{ . }}
    {{- end }}
    ports:
    - protocol: TCP
      port: 9092
    - protocol: TCP
      port: 9093
  {{- else }}
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 9092
    - protocol: TCP
      port: 9093
  {{- end }}
  # Allow HTTPS egress for internal Kubernetes services (webhooks, admission controllers)
  {{- if .WebhookEgressCIDRs }}
  - to:
    {{- range .WebhookEgressCIDRs }}
    - ipBlock:
        cidr: {{ . }}
    {{- end }}
    ports:
    - protocol: TCP
      port: 8443
  {{- else }}
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 8443
  {{- end }}
