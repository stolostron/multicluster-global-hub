apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{.Name}}
  namespace: {{.Namespace}}
  labels:
    global-hub.open-cluster-management.io/managed-by: global-hub-operator
spec:
  podSelector:
    matchLabels:
      name: {{.Name}}
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Allow incoming connections to HTTP and gRPC ports
  - ports:
    - protocol: TCP
      port: 8081
    - protocol: TCP
      port: 9081
  egress:
  # Allow connections to PostgreSQL
  - to:
    - podSelector:
        matchLabels:
          name: {{.PostgresName}}
    ports:
    - protocol: TCP
      port: 5432
  # Allow connections to Kafka
  - to:
    - podSelector:
        matchLabels:
          strimzi.io/cluster: kafka
    ports:
    - protocol: TCP
      port: 9093
  # Allow access to Kubernetes API
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: default
    ports:
    - protocol: TCP
      port: 443
  # Allow connections to SpiceDB
  - to:
    - podSelector:
        matchLabels:
          authzed.com/cluster: spicedb
    ports:
    - protocol: TCP
      port: 50051
  # Allow connections to relations-api
  - to:
    - podSelector:
        matchLabels:
          app: relations-api
    ports:
    - protocol: TCP
      port: 8000
