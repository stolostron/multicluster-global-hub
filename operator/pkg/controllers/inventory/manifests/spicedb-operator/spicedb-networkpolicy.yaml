apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: spicedb
  namespace: {{.Namespace}}
  labels:
    global-hub.open-cluster-management.io/managed-by: global-hub-operator
spec:
  podSelector:
    matchLabels:
      authzed.com/cluster: spicedb
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Allow incoming connections from known Global Hub callers
  - from:
    - podSelector:
        matchLabels:
          name: multicluster-global-hub-manager
    - podSelector:
        matchLabels:
          name: inventory-api
    - podSelector:
        matchLabels:
          app: relations-api
    - podSelector:
        matchLabels:
          name: multicluster-global-hub-operator
    ports:
    - protocol: TCP
      port: 50051  # gRPC API
    - protocol: TCP
      port: 8443   # HTTP Gateway
    - protocol: TCP
      port: 9090   # Metrics
    - protocol: TCP
      port: 50053  # Dispatch cluster
  # Allow metrics scraping from Prometheus
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: openshift-monitoring
    ports:
    - protocol: TCP
      port: 9090
  egress:
  # Allow connections to PostgreSQL
  - to:
    - podSelector:
        matchLabels:
          name: {{.PostgresName}}
    ports:
    - protocol: TCP
      port: 5432
  # Allow access to Kubernetes API
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: default
    ports:
    - protocol: TCP
      port: 443
