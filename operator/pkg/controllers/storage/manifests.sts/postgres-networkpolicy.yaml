apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{.Name}}
  namespace: {{.Namespace}}
  labels:
    name: {{.Name}}
spec:
  podSelector:
    matchLabels:
      name: {{.Name}}
  policyTypes:
  - Ingress
  - Egress
  ingress:
      # Allow connections from operator (for database verification)
  - from:
    - podSelector:
        matchLabels:
          name: multicluster-global-hub-operator
    ports:
    - protocol: TCP
      port: 5432
  # Allow connections from manager
  - from:
    - podSelector:
        matchLabels:
          name: multicluster-global-hub-manager
    ports:
    - protocol: TCP
      port: 5432
  # Allow connections from grafana
  - from:
    - podSelector:
        matchLabels:
          name: multicluster-global-hub-grafana
    ports:
    - protocol: TCP
      port: 5432
  # Allow connections from inventory-api
  - from:
    - podSelector:
        matchLabels:
          name: inventory-api
    ports:
    - protocol: TCP
      port: 5432
  # Allow connections from relations-api
  - from:
    - podSelector:
        matchLabels:
          app: relations-api
    ports:
    - protocol: TCP
      port: 5432
  # Allow connections from spicedb (including migration jobs)
  - from:
    - podSelector:
        matchLabels:
          authzed.com/cluster: spicedb
    ports:
    - protocol: TCP
      port: 5432
  # Allow TCP 5432 from any source (no `from` selector). Required for Jenkins globalhub-e2e
  # BeforeSuite, which exposes postgres via NodePort Service
  # multicluster-global-hub-postgresql-external (port 32433) and connects from outside the
  # cluster. Also used by backup tools on NodePort. Cannot scope with pod/namespace selectors
  # for external clients. Follow-up: ipBlock CIDR hardening (ACM-31409, PR #2561).
  - ports:
    - protocol: TCP
      port: 5432
  # Allow Prometheus exporter scraping
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: openshift-monitoring
    ports:
    - protocol: TCP
      port: 9187
  egress:
  # Allow DNS resolution
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: openshift-dns
    ports:
    - protocol: UDP
      port: 5353
    - protocol: TCP
      port: 5353
  # Allow access to Kubernetes API for certificate verification
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: default
    ports:
    - protocol: TCP
      port: 443
