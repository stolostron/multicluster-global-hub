kind: ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  creationTimestamp: null
  name: multicluster-global-hub-operator-aggregated-clusterrole
rules:
# for oauth-proxy
- apiGroups:
  - authentication.k8s.io
  resources:
  - tokenreviews
  verbs:
  - create
# for oauth-proxy
- apiGroups:
  - authorization.k8s.io
  resources:
  - subjectaccessreviews
  verbs:
  - create
- apiGroups:
  - "policy.open-cluster-management.io"
  resources:
  - policies
  - policies/status
  - policies/finalizers
  - placementbindings
  - placementbindings/finalizers
  verbs:
  - get
  - list
  - watch
  - update
  - patch
- apiGroups:
  - "cluster.open-cluster-management.io"
  resources:
  - placements
  - placements/finalizers
  - placements/status
  - placementdecisions
  - placementdecisions/status
  verbs:
  - create
  - get
  - list
  - watch
  - update
  - patch
  - delete
- apiGroups:
  - ""
  resources:
  - pods
  - configmaps
  - events
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - "cluster.open-cluster-management.io"
  resources:
  - managedclustersets
  - managedclustersets/finalizers
  - managedclustersetbindings
  - managedclustersetbindings/finalizers
  - placements
  - placements/finalizers
  verbs:
  - get
  - list
  - watch
  - update
- apiGroups:
  - "apiextensions.k8s.io"
  resources:
  - customresourcedefinitions
  verbs:
  - get
- apiGroups:
  - apps
  resources:
  - deployments
  verbs:
  - get
  - list
  - watch
# Hub HA - List ManagedClusters to discover active/standby hub roles
- apiGroups:
  - cluster.open-cluster-management.io
  resources:
  - managedclusters
  verbs:
  - get
  - list
  - watch
# Hub HA - Full permissions for applying all Hub HA resources to standby hub
# Full CRUD permissions for resources with *.open-cluster-management.io suffix (excluding internal, operator, work, search, etc.)
- apiGroups:
  - addon.open-cluster-management.io
  - apps.open-cluster-management.io
  - authentication.open-cluster-management.io
  - cluster.open-cluster-management.io
  - config.open-cluster-management.io
  - console.open-cluster-management.io
  - discovery.open-cluster-management.io
  - global-hub.open-cluster-management.io
  - imageregistry.open-cluster-management.io
  - inventory.open-cluster-management.io
  - multicluster.openshift.io
  - observability.open-cluster-management.io
  - policy.open-cluster-management.io
  - rbac.open-cluster-management.io
  - register.open-cluster-management.io
  - siteconfig.open-cluster-management.io
  - submarineraddon.open-cluster-management.io
  resources:
  - '*'
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
# Full CRUD permissions for *.hive.openshift.io resources (excluding admission)
- apiGroups:
  - hive.openshift.io
  - extensions.hive.openshift.io
  - hiveinternal.openshift.io
  resources:
  - '*'
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
# Full CRUD permissions for explicitly included API groups
- apiGroups:
  - argoproj.io
  - app.k8s.io
  - core.observatorium.io
  - agent-install.openshift.io
  - capi-provider.agent-install.openshift.io
  resources:
  - '*'
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
# Full CRUD permissions for metal3.io resources (BareMetalHost)
- apiGroups:
  - metal3.io
  resources:
  - '*'
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
---
