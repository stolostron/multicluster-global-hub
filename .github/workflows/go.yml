name: Go

on:
  workflow_dispatch: {}
  pull_request:
    branches:
      - main
      - release-*
  push:
    branches:
      - main
      - release-*

jobs:
  format:
    name: format
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: '1.26'

      - name: Setup format tools
        run: go install tool

      - name: format
        run: make strict-fmt
  verify-bundle:
    name: verify bundle
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: bundle
        run: cd operator && make bundle

  scorecard-test:
    name: bundle scorecard test
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Create k8s Kind Cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1

      - name: Download operator-sdk
        uses: drmendes/setup-k8s-operator-sdk@576d2bf133e6b89a808063375f56c892475627aa # v1.1.5
        with:
          version: "^1.34.1"

      - name: scorecard
        run: cd operator && operator-sdk scorecard ./bundle/
