name: Go

on:
  workflow_dispatch: {}
  pull_request:
    branches:
      - main
      - release-*
  push:
    branches:
      - main
      - release-*

jobs:
  format:
    name: format
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.25'

      - name: Setup gci
        run: go install github.com/daixiang0/gci@v0.13.7

      - name: Setup gofumpt
        run: go install mvdan.cc/gofumpt@v0.8.0

      - name: format
        run: make strict-fmt
  verify-bundle:
    name: verify bundle
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: bundle
        run: cd operator && make bundle

  scorecard-test:
    name: bundle scorecard test
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Create k8s Kind Cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1

      - name: Download operator-sdk
        uses: drmendes/setup-k8s-operator-sdk@576d2bf133e6b89a808063375f56c892475627aa # v1.1.5
        with:
          version: "^1.34.1"

      - name: scorecard
        run: cd operator && operator-sdk scorecard ./bundle/
